version: 2

models:
  - name: dim_taxi_zones
    description: >
      Gold dimension table containing NYC Taxi TLC geographic zones.
      Each record represents a unique taxi zone identified by `location_key`
      and provides the borough, zone name, and service zone classification.

      The model is derived from the bronze staging view `vw_taxi_trip_zones`
      and serves as a reference dimension for joining pickup and dropoff
      location identifiers in taxi fact tables.

    config:
      tags: ['dimension', 'taxi', 'zones']

    columns:

      # =========================
      # Primary Key
      # =========================

      - name: location_key
        description: "Unique identifier of the taxi zone defined by NYC TLC."
        data_type: int
        tests:
          - not_null
          - unique

      # =========================
      # Geographic Attributes
      # =========================

      - name: borough
        description: >
          Borough where the taxi zone is located.
          Possible values include Manhattan, Brooklyn, Queens,
          Bronx, Staten Island, EWR, Unknown, or N/A.
        data_type: string
        tests:
          - not_null

      - name: zone
        description: "Human-readable name of the taxi zone."
        data_type: string
        tests:
          - not_null

      - name: service_zone
        description: >
          Taxi service classification used in the NYC taxi datasets.
          Typical values include Yellow Zone, Boro Zone, Airports, EWR, or N/A.
        data_type: string
        tests:
          - not_null
