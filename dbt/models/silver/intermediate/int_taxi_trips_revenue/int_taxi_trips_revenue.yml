version: 2

models:
  - name: int_taxi_trips_revenue
    description: >
      Hourly aggregated taxi revenue metrics in wide (pivoted) format.
      Each row represents a unique combination of vendor, pickup/dropoff locations,
      pickup hour, taxi type and payment type. Partitioned by partition_date and
      supports incremental merge loading.

    config:
      tags: ['intermediate', 'hourly', 'revenue']

    columns:

      # =========================
      # Business Dimensions (Grain)
      # =========================

      - name: vendor_id
        description: "Identifier of the taxi data vendor."
        data_type: bigint
        tests:
          - not_null

      - name: pickup_location_id
        description: "Pickup TLC location ID."
        data_type: bigint
        tests:
          - not_null

      - name: dropoff_location_id
        description: "Dropoff TLC location ID."
        data_type: bigint
        tests:
          - not_null

      - name: date_hour_pickup_datetime
        description: "Pickup timestamp truncated to hour level."
        data_type: timestamp
        tests:
          - not_null

      - name: taxi_type
        description: "Taxi stream type (yellow or green)."
        data_type: string
        tests:
          - not_null
          - accepted_values:
              values: ['yellow', 'green']

      - name: payment_type
        description: "Payment method used for the trip."
        data_type: int
        tests:
          - not_null

      # =========================
      # Partition Column
      # =========================

      - name: partition_date
        description: "Partition date used for incremental loading (max partition_date from source rows)."
        data_type: date
        tests:
          - not_null

      # =========================
      # Metrics
      # =========================

      - name: total_trips
        description: "Total number of taxi trips."
        data_type: bigint
        tests:
          - not_null

      - name: total_fare_amount
        description: "Total fare amount aggregated from taxi trips."
        data_type: double
        tests:
          - not_null

      - name: total_tip_amount
        description: "Total tip amount aggregated from taxi trips."
        data_type: double
        tests:
          - not_null

      - name: total_tolls_amount
        description: "Total toll charges aggregated from taxi trips."
        data_type: double
        tests:
          - not_null

      - name: total_amount
        description: "Total trip amount including fare, tips, tolls and surcharges."
        data_type: double
        tests:
          - not_null

      # =========================
      # Technical Column
      # =========================

      - name: pickup_month
        description: "Date hour trunc from pickup datetime, month level."
        data_type: date
        tests:
          - not_null

      - name: dwh_updated_at
        description: "Timestamp when the record was processed in the DWH."
        data_type: timestamp
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - vendor_id
            - pickup_location_id
            - dropoff_location_id
            - date_hour_pickup_datetime
            - taxi_type
            - payment_type
