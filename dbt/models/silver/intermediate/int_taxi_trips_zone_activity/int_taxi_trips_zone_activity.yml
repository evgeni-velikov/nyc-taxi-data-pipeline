version: 2

models:
  - name: int_taxi_trips_zone_activity
    description: >
      Hourly aggregated taxi zone activity metrics in wide (pivoted) format.
      Each row represents a unique combination of vendor, pickup/dropoff locations,
      pickup hour and taxi type. Partitioned by partition_date and supports
      incremental merge loading.

    config:
      tags: ['intermediate', 'hourly', 'zone_activity']

    columns:

      # =========================
      # Business Dimensions (Grain)
      # =========================

      - name: vendor_id
        description: "Identifier of the taxi data vendor."
        data_type: bigint
        tests:
          - not_null

      - name: pickup_location_id
        description: "Pickup TLC location ID."
        data_type: bigint
        tests:
          - not_null

      - name: dropoff_location_id
        description: "Dropoff TLC location ID."
        data_type: bigint
        tests:
          - not_null

      - name: date_hour_pickup_datetime
        description: "Pickup timestamp truncated to hour level."
        data_type: timestamp
        tests:
          - not_null

      - name: taxi_type
        description: "Taxi stream type (yellow or green)."
        data_type: string
        tests:
          - not_null
          - accepted_values:
              values: ['yellow', 'green']

      # =========================
      # Partition Column
      # =========================

      - name: partition_date
        description: "Partition date used for incremental loading (max partition_date from source rows)."
        data_type: date
        tests:
          - not_null

      # =========================
      # Metrics
      # =========================

      - name: total_trips
        description: "Total number of taxi trips."
        data_type: bigint
        tests:
          - not_null

      - name: total_passenger_count
        description: "Total number of passengers aggregated from taxi trip records."
        data_type: bigint
        tests:
          - not_null

      - name: total_trip_distance
        description: "Total aggregated trip distance in miles."
        data_type: double
        tests:
          - not_null

      # =========================
      # Technical Column
      # =========================

      - name: pickup_month
        description: "Date hour trunc from pickup datetime, month level."
        data_type: date
        tests:
          - not_null

      - name: dwh_updated_at
        description: "Timestamp when the record was processed in the DWH."
        data_type: timestamp
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - vendor_id
            - pickup_location_id
            - dropoff_location_id
            - date_hour_pickup_datetime
            - taxi_type
