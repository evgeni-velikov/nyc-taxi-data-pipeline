services:

  # ---------------------------
  # MySQL (Hive metastore) - LOCAL only
  # ---------------------------
  mysql:
    image: mysql:8
    profiles:
      - local
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  # ---------------------------
  # Airflow metadata DB - LOCAL only
  # ---------------------------
  airflow-postgres:
    image: postgres:15
    profiles:
      - local
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ---------------------------
  # Hive metastore
  # ---------------------------
  hive-metastore:
    image: apache/hive:3.1.3
    volumes:
      - ./docker/hive:/opt/hive/conf
      - ./drivers/mysql-connector-j-8.3.0.jar:/opt/hive/lib/mysql.jar
      - ./warehouse:/warehouse
    container_name: hive-metastore
    entrypoint: /bin/bash
    command:
      - -c
      - |
        export HIVE_CONF_DIR=/opt/hive/conf
        /opt/hive/bin/schematool -dbType mysql -validate || /opt/hive/bin/schematool -dbType mysql -initSchema
        /opt/hive/bin/hive --service metastore
    env_file:
      - .env
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f HiveMetaStore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ---------------------------
  # Spark cluster
  # ---------------------------
  spark-master:
    user: "0:0"
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    command: bash -c "/opt/spark/sbin/start-master.sh && tail -f /dev/null"
    volumes:
      - ./data:/data
      - ./src:/app/src
      - ./warehouse:/warehouse
    env_file:
      - .env
    ports:
      - "7077:7077"
      - "8080:8080"
    restart: always

  spark-worker:
    user: "0:0"
    tmpfs:
      - /tmp:size=4g
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    command: bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 && tail -f /dev/null"
    volumes:
      - ./data:/data
      - ./warehouse:/warehouse
    depends_on:
      - spark-master
    env_file:
      - .env
    restart: always

  spark-thrift:
    user: "0:0"
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    command: >
      bash -c "
      echo 'Waiting for Hive Metastore to be ready...';
      for i in {1..30}; do
        if timeout 2 bash -c 'cat < /dev/null > /dev/tcp/hive-metastore/9083' 2>/dev/null; then
          echo 'Hive Metastore is ready!';
          break;
        fi;
        echo 'Waiting for Hive Metastore... attempt' \$i;
        sleep 2;
      done;
      /opt/spark/sbin/start-thriftserver.sh --master spark://spark-master:7077 --conf spark.cores.max=4 --conf spark.executor.cores=4 --conf spark.executor.memory=4g --conf spark.dynamicAllocation.enabled=false && tail -f /dev/null
      "
    env_file:
      - .env
    ports:
      - "10000:10000"
    volumes:
      - ./warehouse:/warehouse
    depends_on:
      spark-master:
        condition: service_started
      hive-metastore:
        condition: service_healthy
    restart: always

  # ---------------------------
  # dbt
  # ---------------------------
  dbt:
    image: data-dbt:latest
    build:
      context: .
      dockerfile: docker/dbt/Dockerfile
    volumes:
      - ./dbt:/dbt
      - ./dbt/profiles:/root/.dbt
    depends_on:
      - spark-thrift
    env_file:
      - .env

  # ---------------------------
  # Airflow init
  # ---------------------------
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username admin \
      --password admin \
      --firstname admin \
      --lastname admin \
      --role Admin \
      --email admin@example.com"
    restart: "no"

  # ---------------------------
  # Airflow webserver
  # ---------------------------
  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: webserver
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
      - ./warehouse:/opt/warehouse
    ports:
      - "8081:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      spark-thrift:
        condition: service_started
    restart: always

  # ---------------------------
  # Airflow scheduler
  # ---------------------------
  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: scheduler
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
      - ./warehouse:/opt/warehouse
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow:
        condition: service_started
    restart: always

  # ---------------------------
  # Airflow triggerer
  # ---------------------------
  airflow-triggerer:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    command: triggerer
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dbt:/opt/dbt
      - ./src:/opt/src
      - ./warehouse:/opt/warehouse
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow:
        condition: service_started
    restart: always

volumes:
  mysql-data:
  postgres-data:

networks:
  default:
    name: nyc-taxi-data-pipeline
